<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="1.0.0">
<title>Polymarket R1 v1.0.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   Polymarket-inspired palette
   ══════════════════════════════════════════════ */
:root {
  --bg:#0d1520;
  --surf:#141f2e;
  --surf2:#1a2a3e;
  --offset:#22344d;
  --div:#2c3f52;
  --bord:#3a5170;
  --txt:#ffffff;
  --txt2:#c8d2df;
  --muted:#8b96a3;
  --faint:#5a6879;
  --yes:#00d9a0;         /* Polymarket signature green */
  --yes-bright:#25f0b4;
  --no:#ff5c8d;          /* Pink/red for No */
  --no-bright:#ff7ba2;
  --neutral:#7ba7ff;
  --warn:#ffb84d;
  --live:#00d9a0;
  --glow-yes:0 0 4px rgba(0,217,160,.7),0 0 10px rgba(0,217,160,.35);
  --glow-no:0 0 4px rgba(255,92,141,.7),0 0 10px rgba(255,92,141,.35);
  --mono:'JetBrains Mono',monospace;
  --body:'Inter',sans-serif;
  --xs:0.5625rem;--sm:0.625rem;--base:0.6875rem;--md:0.8125rem;--lg:0.9375rem;
  --r:0.25rem;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:none}
body{font-family:var(--body);font-size:var(--base);color:var(--txt);
  background:
    radial-gradient(ellipse at 50% 0%, rgba(0,217,160,.10) 0%, transparent 55%),
    var(--bg);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;max-width:240px;margin:0 auto;
  position:relative}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;
  background:linear-gradient(180deg,var(--surf) 0%,var(--bg) 100%);
  border-bottom:2px solid var(--yes);box-shadow:0 0 8px rgba(0,217,160,.25);
  flex-shrink:0;min-height:24px;position:relative;z-index:2}
.header-brand{display:flex;align-items:center;gap:5px}
.brand-mark{width:14px;height:14px;border-radius:50%;background:var(--yes);position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-yes)}
.brand-mark::after{content:'P';position:absolute;color:var(--bg);font-family:var(--body);font-size:9px;font-weight:800}
.brand-text{font-family:var(--body);font-size:var(--sm);font-weight:700;letter-spacing:.04em;color:var(--txt)}
.brand-text span{color:var(--yes);text-shadow:var(--glow-yes)}
.header-right{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:7px}
.live-pulse{width:6px;height:6px;border-radius:50%;background:var(--yes);animation:pulse 1.6s ease-in-out infinite;box-shadow:var(--glow-yes)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(0.8)}}
.live-text{color:var(--yes);font-weight:700;letter-spacing:.04em}

/* ── Tabs ── */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--div);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 0 auto;padding:5px 6px;font-family:var(--body);font-size:var(--xs);font-weight:700;text-align:center;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;
  cursor:pointer;min-height:22px;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.tab.active{color:var(--yes);border-bottom-color:var(--yes);text-shadow:var(--glow-yes)}

/* ── Main ─ MLB scroll fix recipe ── */
.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;background:var(--bg);position:relative}

/* ── Market/Event row ── */
.event-row{display:flex;flex-direction:column;gap:3px;padding:5px 6px;
  border-bottom:1px solid color-mix(in oklch,var(--div) 55%,transparent);
  background:var(--surf);cursor:pointer;transition:background .12s;min-height:42px}
.event-row.focused{background:var(--offset);box-shadow:inset 3px 0 0 var(--yes),0 0 6px rgba(0,217,160,.3)}
.event-row:hover{background:var(--surf2)}
.event-title{font-family:var(--body);font-size:var(--xs);font-weight:600;color:var(--txt);line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.event-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:7px;color:var(--muted);letter-spacing:.03em}
.event-meta .vol{color:var(--yes-bright);font-weight:700}
.event-meta .mkts{color:var(--muted)}

/* Yes/No inline probability strip for binary markets */
.prob-strip{display:flex;align-items:center;gap:4px;margin-top:2px;font-family:var(--mono);font-size:8px;font-weight:700}
.prob-bar{flex:1;height:5px;background:var(--offset);border-radius:2px;overflow:hidden;position:relative}
.prob-bar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--yes) 0%,var(--yes-bright) 100%);border-radius:2px;box-shadow:var(--glow-yes);transition:width .3s}
.prob-bar-fill.no{background:linear-gradient(90deg,var(--no) 0%,var(--no-bright) 100%);box-shadow:var(--glow-no)}
.prob-pct{color:var(--yes);font-weight:700;min-width:26px;text-align:right;text-shadow:var(--glow-yes)}
.prob-pct.no{color:var(--no);text-shadow:var(--glow-no)}

/* Multi-outcome preview (top choice) */
.top-outcome{display:flex;justify-content:space-between;align-items:center;font-family:var(--body);font-size:8px;color:var(--txt2);margin-top:2px}
.top-outcome .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.top-outcome .pct{color:var(--yes);font-weight:700;text-shadow:var(--glow-yes);font-family:var(--mono);font-size:9px}

/* ── Detail view ── */
.detail-back{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--surf);
  border-bottom:1px solid var(--div);font-family:var(--mono);font-size:var(--xs);color:var(--yes);
  font-weight:700;cursor:pointer;min-height:22px;text-transform:uppercase;letter-spacing:.04em}
.detail-back:hover{background:var(--surf2)}

.detail-header{padding:6px 8px;background:linear-gradient(180deg,var(--surf2) 0%,var(--surf) 100%);border-bottom:1px solid var(--div)}
.detail-title{font-family:var(--body);font-size:var(--sm);font-weight:700;color:var(--txt);line-height:1.3;margin-bottom:4px}
.detail-stats{display:flex;justify-content:space-between;gap:6px;font-family:var(--mono);font-size:7px}
.detail-stat{display:flex;flex-direction:column;gap:1px;flex:1}
.detail-stat .lbl{color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-size:6px}
.detail-stat .val{color:var(--txt);font-weight:700;font-size:8px}
.detail-stat .val.yes{color:var(--yes-bright);text-shadow:var(--glow-yes)}

/* Sub-tabs */
.subtabs{display:flex;background:var(--surf2);border-bottom:1px solid var(--div);flex-shrink:0}
.subtab{flex:1;padding:4px 6px;font-family:var(--mono);font-size:7px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;
  cursor:pointer;text-align:center}
.subtab.active{color:var(--yes);border-bottom-color:var(--yes);text-shadow:var(--glow-yes)}

/* Market card inside detail */
.mkt-card{padding:6px 8px;border-bottom:1px solid color-mix(in oklch,var(--div) 50%,transparent);background:var(--surf)}
.mkt-question{font-family:var(--body);font-size:var(--xs);font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:4px}
.mkt-outcomes{display:flex;flex-direction:column;gap:3px}
.mkt-outcome-row{display:flex;align-items:center;gap:5px}
.mkt-outcome-name{font-family:var(--body);font-size:8px;color:var(--txt2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.mkt-outcome-bar{width:60px;height:4px;background:var(--offset);border-radius:2px;overflow:hidden;flex-shrink:0}
.mkt-outcome-bar-fill{height:100%;background:linear-gradient(90deg,var(--yes) 0%,var(--yes-bright) 100%);border-radius:2px;box-shadow:var(--glow-yes)}
.mkt-outcome-bar-fill.no{background:linear-gradient(90deg,var(--no) 0%,var(--no-bright) 100%);box-shadow:var(--glow-no)}
.mkt-outcome-pct{font-family:var(--mono);font-size:9px;color:var(--yes);font-weight:700;min-width:26px;text-align:right;text-shadow:var(--glow-yes)}
.mkt-outcome-pct.no{color:var(--no);text-shadow:var(--glow-no)}
.mkt-vol{font-family:var(--mono);font-size:6px;color:var(--muted);margin-top:3px;text-align:right;letter-spacing:.04em}

/* Description text */
.desc{padding:8px;font-family:var(--body);font-size:var(--xs);color:var(--txt2);line-height:1.4;white-space:pre-wrap;word-wrap:break-word}

/* Empty/loading */
.empty{text-align:center;padding:24px 12px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-icon{font-size:32px;opacity:.4}
.empty-title{font-family:var(--body);font-size:var(--sm);color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.empty-sub{font-family:var(--mono);font-size:var(--xs);color:var(--muted);max-width:200px;line-height:1.5}
.spinner{width:24px;height:24px;border-radius:50%;border:2px solid var(--offset);border-top-color:var(--yes);animation:spin 1s linear infinite;box-shadow:var(--glow-yes)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Footer */
.footer{display:flex;align-items:center;justify-content:space-between;padding:2px 8px;
  background:linear-gradient(0deg,var(--surf) 0%,var(--bg) 100%);
  border-top:1px solid var(--yes);box-shadow:0 0 6px rgba(0,217,160,.25);
  flex-shrink:0;min-height:16px;font-family:var(--mono);font-size:7px;position:relative;z-index:2}
.footer-left{color:var(--muted)}
.footer-mid{flex:1;text-align:center;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.footer-right{color:var(--yes);display:flex;align-items:center;gap:3px;font-weight:700;text-shadow:var(--glow-yes)}

/* Prompt hint */
.prompt{padding:3px 8px;text-align:center;font-family:var(--mono);font-size:7px;color:var(--muted);background:var(--surf);border-top:1px solid var(--div);flex-shrink:0;letter-spacing:.05em;position:relative;z-index:2}
.prompt span.k{color:var(--yes);font-weight:700;text-shadow:var(--glow-yes)}

/* Debug HUD */
.dbg{position:fixed;top:24px;left:0;right:0;max-width:240px;margin:0 auto;
  background:rgba(0,0,0,0.85);color:#0f0;font-family:var(--mono);font-size:8px;
  padding:4px 6px;z-index:9999;display:none;line-height:1.3;border-bottom:1px solid #0f0}
.dbg.show{display:block}
.dbg-row{display:flex;justify-content:space-between}
.dbg-evt{color:#0ff}
</style>
</head>
<body>

<header class="header" id="appHeader">
  <div class="header-brand">
    <div class="brand-mark"></div>
    <div class="brand-text">POLY<span>MARKET</span></div>
  </div>
  <div class="header-right">
    <span class="live-pulse"></span>
    <span class="live-text" id="totalVol">—</span>
  </div>
</header>

<!-- Debug HUD -->
<div class="dbg" id="dbg">
  <div class="dbg-row"><span class="dbg-evt">scrollUp</span>  <span id="dbgUp">0</span></div>
  <div class="dbg-row"><span class="dbg-evt">scrollDown</span><span id="dbgDown">0</span></div>
  <div class="dbg-row"><span class="dbg-evt">sideClick</span> <span id="dbgSide">0</span></div>
  <div class="dbg-row"><span class="dbg-evt">longPress</span> <span id="dbgLong">0</span></div>
  <div class="dbg-row"><span class="dbg-evt">state</span><span id="dbgState">list</span></div>
</div>

<div class="tabs" id="tabs"></div>
<main class="main" id="main"></main>

<div class="prompt">
  <span class="k">SCROLL</span> · <span class="k">PTT</span> open · <span class="k">LONG</span> refresh
</div>

<footer class="footer">
  <span class="footer-left" id="footerLeft">v1.0.0</span>
  <span class="footer-mid" id="footerMid">Loading…</span>
  <span class="footer-right"><span id="countdown">30s</span></span>
</footer>

<script>
/* ═══════════════════════════════════════════════
   Polymarket R1 v1.0.0
   Free public API: gamma-api.polymarket.com
   ═══════════════════════════════════════════════ */

const TABS = [
  { key: 'trending',   label: 'TRENDING',   tag: null },
  { key: 'politics',   label: 'POLITICS',   tag: 'politics' },
  { key: 'sports',     label: 'SPORTS',     tag: 'sports' },
  { key: 'crypto',     label: 'CRYPTO',     tag: 'crypto' },
  { key: 'economy',    label: 'ECONOMY',    tag: 'economy' },
  { key: 'tech',       label: 'TECH',       tag: 'tech' }
];

const API = 'https://gamma-api.polymarket.com';
const LIST_REFRESH_MS = 30000;
const DETAIL_REFRESH_MS = 15000;

const S = {
  tab: 'trending',
  events: [],
  focusedIdx: 0,
  loading: false,
  refreshing: false,
  view: 'list',              // 'list' | 'detail'
  selectedEvent: null,       // full event object with markets
  detailScrollIdx: 0,
  detailSubTab: 'markets',   // 'markets' | 'details'
  detailTimer: null,
  countdown: 30,
  countdownTimer: null,
  lastFetch: 0,
  dbgOn: false
};

const $ = id => document.getElementById(id);

/* ── Debug HUD ── */
window.__dbg = {
  counts: { up:0, down:0, side:0, long:0 },
  hit(k) { this.counts[k]++; $(`dbg${k[0].toUpperCase()+k.slice(1)}`).textContent = this.counts[k]; }
};

/* ── Formatters ── */
function fmtVol(n) {
  n = parseFloat(n) || 0;
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function pct(p) {
  const n = (parseFloat(p) || 0) * 100;
  if (n < 1 && n > 0) return '<1%';
  if (n > 99 && n < 100) return '>99%';
  return Math.round(n) + '%';
}
function parseArr(s) {
  if (!s) return [];
  if (Array.isArray(s)) return s;
  try { return JSON.parse(s); } catch(e) { return []; }
}

/* ── API ── */
async function fetchEvents(tab) {
  const t = TABS.find(x => x.key === tab);
  let url = `${API}/events?active=true&closed=false&limit=40&order=volume24hr&ascending=false&_=${Math.floor(Date.now()/5000)}`;
  if (t?.tag) url += `&tag_slug=${t.tag}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  return (data || []).filter(e => (e.markets || []).length > 0);
}

async function fetchEventDetail(id) {
  const url = `${API}/events/${id}?_=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

/* ── Load list ── */
async function loadList() {
  S.loading = true;
  S.refreshing = true;
  updateFooter();
  if (S.events.length === 0) render();
  try {
    const events = await fetchEvents(S.tab);
    S.events = events;
    S.focusedIdx = Math.min(S.focusedIdx, Math.max(0, events.length - 1));
    S.lastFetch = Date.now();
  } catch(e) {
    console.error('load fail', e);
  }
  S.loading = false;
  S.refreshing = false;
  updateFooter();
  render();
  updateTotalVol();
}

function updateTotalVol() {
  const total = S.events.reduce((s, e) => s + (parseFloat(e.volume24hr) || 0), 0);
  $('totalVol').textContent = fmtVol(total);
}

/* ── Render tabs ── */
function renderTabs() {
  const t = $('tabs');
  t.innerHTML = TABS.map(x =>
    `<button class="tab ${x.key === S.tab ? 'active' : ''}" onclick="switchTab('${x.key}')">${x.label}</button>`
  ).join('');
}

function switchTab(key) {
  if (key === S.tab || S.view !== 'list') return;
  S.tab = key;
  S.focusedIdx = 0;
  S.events = [];
  loadList();
}

/* ── Get top outcome from event ── */
function topOutcome(event) {
  // Find the market with highest liquidity, then its highest-prob outcome
  const markets = event.markets || [];
  if (markets.length === 0) return null;
  // Prefer binary Yes/No first market with meaningful data
  let best = markets[0];
  for (const m of markets) {
    if ((parseFloat(m.liquidity) || 0) > (parseFloat(best.liquidity) || 0)) best = m;
  }
  const outcomes = parseArr(best.outcomes);
  const prices = parseArr(best.outcomePrices).map(x => parseFloat(x) || 0);
  if (outcomes.length === 0) return null;
  let topIdx = 0;
  for (let i = 1; i < prices.length; i++) if (prices[i] > prices[topIdx]) topIdx = i;
  return {
    binary: outcomes.length === 2 && outcomes[0].toLowerCase() === 'yes',
    name: outcomes[topIdx],
    price: prices[topIdx],
    yesPrice: outcomes.length === 2 && outcomes[0].toLowerCase() === 'yes' ? prices[0] : null,
    market: best
  };
}

/* ── Render list ── */
function renderList() {
  const main = $('main');
  if (S.loading && S.events.length === 0) {
    main.innerHTML = `<div class="empty"><div class="spinner"></div><div class="empty-title">LOADING</div><div class="empty-sub">Fetching markets…</div></div>`;
    return;
  }
  if (S.events.length === 0) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">◯</div><div class="empty-title">NO MARKETS</div><div class="empty-sub">No active events in this category.</div></div>`;
    return;
  }
  main.innerHTML = S.events.map((e, i) => {
    const top = topOutcome(e);
    const isFocused = i === S.focusedIdx;
    const vol24 = fmtVol(e.volume24hr);
    const mktCount = (e.markets || []).length;
    let probHtml = '';
    if (top) {
      if (top.binary) {
        const yesPct = Math.round(top.yesPrice * 100);
        probHtml = `
          <div class="prob-strip">
            <span class="prob-pct">${pct(top.yesPrice)}</span>
            <div class="prob-bar"><div class="prob-bar-fill" style="width:${yesPct}%"></div></div>
            <span class="prob-pct no">${pct(1 - top.yesPrice)}</span>
          </div>`;
      } else {
        probHtml = `
          <div class="top-outcome">
            <span class="name">${escapeHtml(top.name)}</span>
            <span class="pct">${pct(top.price)}</span>
          </div>`;
      }
    }
    return `
      <div class="event-row ${isFocused ? 'focused' : ''}" data-idx="${i}" onclick="openEvent(${i})">
        <div class="event-title">${escapeHtml(e.title || '?')}</div>
        <div class="event-meta">
          <span class="vol">${vol24} 24h</span>
          <span class="mkts">${mktCount} market${mktCount !== 1 ? 's' : ''}</span>
        </div>
        ${probHtml}
      </div>`;
  }).join('');
  scrollFocusedIntoView();
}

function scrollFocusedIntoView() {
  const el = document.querySelector('.event-row.focused');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'auto' });
}

/* ── Render detail ── */
async function openEvent(i) {
  const e = S.events[i];
  if (!e) return;
  S.selectedEvent = e;
  S.view = 'detail';
  S.detailScrollIdx = 0;
  S.detailSubTab = 'markets';
  $('dbgState').textContent = 'detail';
  render();
  // Fetch fresh detail (with fuller market list)
  try {
    const detail = await fetchEventDetail(e.id);
    S.selectedEvent = detail;
    render();
  } catch(err) { console.error('detail fail', err); }
  startDetailTimer();
}

function closeEvent() {
  S.view = 'list';
  S.selectedEvent = null;
  stopDetailTimer();
  $('dbgState').textContent = 'list';
  render();
}

function startDetailTimer() {
  stopDetailTimer();
  S.detailTimer = setInterval(async () => {
    if (S.view !== 'detail' || !S.selectedEvent) return;
    try {
      const detail = await fetchEventDetail(S.selectedEvent.id);
      // Preserve scroll
      const main = $('main');
      const sTop = main.scrollTop;
      S.selectedEvent = detail;
      render();
      main.scrollTop = sTop;
    } catch(e) {}
  }, DETAIL_REFRESH_MS);
}

function stopDetailTimer() {
  if (S.detailTimer) { clearInterval(S.detailTimer); S.detailTimer = null; }
}

function switchSubTab(k) {
  S.detailSubTab = k;
  render();
}

function renderDetail() {
  const e = S.selectedEvent;
  if (!e) return;
  const totalVol = fmtVol(e.volume);
  const vol24 = fmtVol(e.volume24hr);
  const endDate = e.endDate ? new Date(e.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  const markets = (e.markets || []).slice().sort((a,b) => (parseFloat(b.liquidity)||0) - (parseFloat(a.liquidity)||0));

  let body = '';
  if (S.detailSubTab === 'markets') {
    body = markets.map(m => renderMarketCard(m)).join('') ||
      `<div class="empty"><div class="empty-title">NO MARKETS</div></div>`;
  } else {
    const desc = (e.description || markets[0]?.description || 'No description available.').trim();
    body = `<div class="desc">${escapeHtml(desc)}</div>`;
  }

  $('main').innerHTML = `
    <div class="detail-back" onclick="closeEvent()">◀ BACK</div>
    <div class="detail-header">
      <div class="detail-title">${escapeHtml(e.title || '?')}</div>
      <div class="detail-stats">
        <div class="detail-stat"><span class="lbl">Vol 24h</span><span class="val yes">${vol24}</span></div>
        <div class="detail-stat"><span class="lbl">Total</span><span class="val">${totalVol}</span></div>
        <div class="detail-stat"><span class="lbl">Ends</span><span class="val">${endDate}</span></div>
      </div>
    </div>
    <div class="subtabs">
      <button class="subtab ${S.detailSubTab==='markets'?'active':''}" onclick="switchSubTab('markets')">MARKETS (${markets.length})</button>
      <button class="subtab ${S.detailSubTab==='details'?'active':''}" onclick="switchSubTab('details')">DETAILS</button>
    </div>
    ${body}
  `;
}

function renderMarketCard(m) {
  const outcomes = parseArr(m.outcomes);
  const prices = parseArr(m.outcomePrices).map(x => parseFloat(x) || 0);
  const vol24 = fmtVol(m.volume24hr);

  // Sort outcomes by price desc for multi-outcome markets
  const pairs = outcomes.map((o, i) => ({ name: o, price: prices[i] || 0, idx: i }));
  const isBinary = outcomes.length === 2 && outcomes[0].toLowerCase() === 'yes';
  if (!isBinary) pairs.sort((a,b) => b.price - a.price);

  const rows = pairs.map(p => {
    const width = Math.max(2, Math.round(p.price * 100));
    const isNo = isBinary && p.name.toLowerCase() === 'no';
    return `
      <div class="mkt-outcome-row">
        <span class="mkt-outcome-name">${escapeHtml(p.name)}</span>
        <div class="mkt-outcome-bar"><div class="mkt-outcome-bar-fill ${isNo?'no':''}" style="width:${width}%"></div></div>
        <span class="mkt-outcome-pct ${isNo?'no':''}">${pct(p.price)}</span>
      </div>`;
  }).join('');

  return `
    <div class="mkt-card">
      <div class="mkt-question">${escapeHtml(m.question || '?')}</div>
      <div class="mkt-outcomes">${rows}</div>
      <div class="mkt-vol">Vol 24h · ${vol24}</div>
    </div>`;
}

/* ── Escape ── */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── Render dispatcher ── */
function render() {
  renderTabs();
  $('footerLeft').textContent = 'v1.0.0';
  updateFooter();
  if (S.view === 'detail') renderDetail();
  else renderList();
}

function updateFooter() {
  if (S.view === 'detail' && S.selectedEvent) {
    $('footerMid').textContent = (S.selectedEvent.markets || []).length + ' markets';
  } else if (S.refreshing) {
    $('footerMid').textContent = 'refreshing…';
  } else {
    $('footerMid').textContent = S.events.length + ' events';
  }
}

/* ── Countdown ── */
function startCountdown() {
  if (S.countdownTimer) clearInterval(S.countdownTimer);
  S.countdown = LIST_REFRESH_MS/1000;
  S.countdownTimer = setInterval(() => {
    S.countdown--;
    if (S.countdown <= 0) {
      S.countdown = LIST_REFRESH_MS/1000;
      if (S.view === 'list') loadList();
    }
    $('countdown').textContent = S.countdown + 's';
  }, 1000);
}

/* ═══════════════════════════════════
   R1 hardware events
   ═══════════════════════════════════ */

function moveFocus(dir) {
  if (S.view === 'detail') {
    scrollDetail(dir);
    return;
  }
  const max = S.events.length - 1;
  S.focusedIdx = Math.max(0, Math.min(max, S.focusedIdx + dir));
  const focused = document.querySelectorAll('.event-row');
  focused.forEach(el => el.classList.remove('focused'));
  const el = focused[S.focusedIdx];
  if (el) {
    el.classList.add('focused');
    el.scrollIntoView({ block: 'nearest', behavior: 'auto' });
  }
}

/* Detail scroll: state-tracked section idx (MLB scroll fix recipe) */
function getDetailSections() {
  return Array.from(document.querySelectorAll('#main .mkt-card, #main .detail-header, #main .desc, #main .subtabs, #main .detail-back'));
}
function scrollDetail(dir) {
  const sections = getDetailSections();
  if (sections.length === 0) return;
  S.detailScrollIdx = Math.max(0, Math.min(S.detailScrollIdx + dir, sections.length - 1));
  const target = sections[S.detailScrollIdx];
  if (target) target.scrollIntoView({ block: 'nearest', behavior: 'auto' });
}

function onScrollUp()   { window.__dbg.hit('up');   moveFocus(-1); }
function onScrollDown() { window.__dbg.hit('down'); moveFocus(+1); }
function onSideClick() {
  window.__dbg.hit('side');
  if (S.view === 'detail') return;
  openEvent(S.focusedIdx);
}
function onLongPress() {
  window.__dbg.hit('long');
  if (S.view === 'list') loadList();
  else if (S.view === 'detail') openEvent(S.events.findIndex(e => e.id === S.selectedEvent?.id));
}
function onBack() {
  if (S.view === 'detail') closeEvent();
}

/* Listen on window, document, body — multi-target for R1 compat */
['scrollUp','scrollDown','sideClick','longPressStart'].forEach(evt => {
  const h = evt === 'scrollUp' ? onScrollUp
        : evt === 'scrollDown' ? onScrollDown
        : evt === 'sideClick' ? onSideClick
        : onLongPress;
  window.addEventListener(evt, h);
  document.addEventListener(evt, h);
  document.body.addEventListener(evt, h);
});

/* Mouse wheel fallback (throttled 150ms) */
let _wheelLast = 0;
window.addEventListener('wheel', e => {
  const now = Date.now();
  if (now - _wheelLast < 150) return;
  _wheelLast = now;
  if (e.deltaY > 0) onScrollDown(); else onScrollUp();
}, { passive: true });

/* Keyboard fallback for testing */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') onScrollUp();
  else if (e.key === 'ArrowDown') onScrollDown();
  else if (e.key === 'Enter' || e.key === ' ') onSideClick();
  else if (e.key === 'Escape' || e.key === 'Backspace') onBack();
  else if (e.key === 'r' || e.key === 'R') onLongPress();
});

/* Touch tap on rows already handled via onclick attribute */

/* Double-tap header to toggle debug HUD */
let _hdrTaps = 0, _hdrTapTimer = null;
$('appHeader').addEventListener('click', () => {
  _hdrTaps++;
  clearTimeout(_hdrTapTimer);
  _hdrTapTimer = setTimeout(() => { _hdrTaps = 0; }, 500);
  if (_hdrTaps >= 2) {
    $('dbg').classList.toggle('show');
    _hdrTaps = 0;
  }
});

/* ── Init ── */
renderTabs();
loadList();
startCountdown();
</script>
</body>
</html>
